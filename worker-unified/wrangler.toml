name = "fuel-saver-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

workers_dev = true

routes = [
  { pattern = "api.fuelsaver.one/*", zone_name = "fuelsaver.one" }
]

[triggers]
crons = ["0 */4 * * *"]

[[kv_namespaces]]
binding = "FUEL_KV"
id = "70110949bef446be9e58dfee01453dfd"

[vars]
BRAZIL_WORKER_URL = "https://fuel-saver-brazil.my-trendy-videos.workers.dev"
# Set these as secrets via: wrangler secret put <NAME>
# MAPBOX_TOKEN, FSQ_CLIENT_ID, FSQ_CLIENT_SECRET, GOOGLE_PLACES_KEY
