<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>FuelSaver — Compare Fuel Prices in 34 Countries | Find Cheapest Gas Stations</title>
    <meta name="description" content="Compare real-time fuel prices across 34 countries including France, Germany, Spain, UK, Italy, Australia, India, Brazil, and more. Find the cheapest gas stations near you and save money on every fill-up." />
    <meta name="keywords" content="fuel prices, gas station finder, cheapest petrol, diesel prices, compare fuel, gasoline prices, fuel price comparison, cheap gas near me, petrol station, fuel cost calculator, France fuel prices, Germany petrol prices, UK diesel prices, Spain gasolina, Italy benzina, Australia fuel prices, India petrol prices, Brazil gasolina, South Korea fuel, Chile combustible, Mexico gasolina, Argentina nafta, Switzerland benzin, Denmark benzin, New Zealand fuel, Netherlands brandstof, Belgium fuel, Greece fuel, Malaysia petrol, UAE fuel prices, South Africa petrol, Croatia fuel, Thailand gasohol, Japan fuel prices, Indonesia pertamina, Poland fuel, Ireland petrol, Estonia fuel, Latvia fuel, Lithuania fuel" />
    <meta name="author" content="FuelSaver" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#f97316" />
    <meta name="geo.placename" content="Worldwide" />
    <link rel="canonical" href="https://fuelsaver.one/" />

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://api.mapbox.com" crossorigin>
    <link rel="dns-prefetch" href="https://api.mapbox.com">
    <link rel="preconnect" href="https://api.fuelsaver.one" crossorigin>
    <link rel="dns-prefetch" href="https://api.fuelsaver.one">

    <!-- Critical CSS for instant first paint -->
    <style>
      :root{--orange-600:#ea580c;--gray-50:#fafafa;--gray-200:#e4e4e7;--gray-800:#27272a;--radius:8px;--shadow-md:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1)}
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:var(--gray-800);background:var(--gray-50);-webkit-font-smoothing:antialiased}
      #root{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}
      .header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--orange-600);color:#fff;flex-shrink:0;box-shadow:var(--shadow-md);z-index:10}
      .header-logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;letter-spacing:-.5px;color:inherit;text-decoration:none}
      .header-logo svg{width:32px;height:32px;border-radius:6px}
      .header-nav{display:flex;gap:4px}
      .header-nav-link{color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;font-weight:500;padding:8px 16px;min-height:44px;display:inline-flex;align-items:center;border-radius:var(--radius)}
      .header-nav-link.active{color:#fff;background:rgba(255,255,255,.2)}
      .main-layout{display:flex;flex:1;overflow:hidden}
      .map-wrapper{position:relative;flex:1;min-width:0}
      .map-container{position:absolute;inset:0}
      .sidebar{width:420px;min-width:320px;max-width:420px;display:flex;flex-direction:column;border-right:1px solid var(--gray-200);background:#fff;overflow-y:auto}
      @media(max-width:900px){.main-layout{flex-direction:column-reverse}.sidebar{width:100%;min-width:unset;max-width:unset;max-height:44px;overflow:hidden;border-right:none;border-top:1px solid var(--gray-200)}.map-wrapper{flex:1;min-height:0}}
      @media(max-width:480px){.header{padding:0 12px}.header-logo{font-size:16px}.header-nav-link{font-size:13px;padding:8px 12px;min-height:44px}}
    </style>

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <meta property="og:type" content="website" />

    <meta name="twitter:image" content="https://fuelsaver.one/og-image.svg" />

        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"

        "featureList": [

          "34 countries supported",
          "Interactive map with station locations",
          "Distance-based search",
          "Multiple fuel type filtering"
        ],
        "availableLanguage": "en",
        "countriesSupported": "FR, DE, HR, LU, PT, SI, UK, IE, ES, IT, AT, KR, CL, AU, MX, BR, AR, CH, DK, NZ, NL, BE, GR, MY, AE, ZA, IN, EE, LV, LT, PL, TH, JP, ID"
      }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "FuelSaver",
        "url": "https://fuelsaver.one/",
        "description": "Compare fuel prices and find the cheapest gas stations near you across 34 countries",
        "potentialAction": {

          "target": "https://fuelsaver.one/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "description": "Real-time fuel price comparison across 34 countries"
      }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How many countries does FuelSaver support?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "FuelSaver currently supports real-time fuel price comparison in 34 countries: France, Germany, Croatia, Luxembourg, Portugal, Slovenia, United Kingdom, Ireland, Spain, Italy, Austria, South Korea, Chile, Australia, Mexico, Brazil, Argentina, Switzerland, Denmark, New Zealand, Netherlands, Belgium, Greece, Malaysia, UAE, South Africa, India, Estonia, Latvia, Lithuania, Poland, Thailand, Japan, and Indonesia."
            }
          },
          {
            "@type": "Question",
            "name": "Is FuelSaver free to use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, FuelSaver is completely free. You can compare fuel prices and find the cheapest gas stations near you without any cost or registration."
            }
          },
          {
            "@type": "Question",
            "name": "How does FuelSaver get its fuel price data?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "FuelSaver aggregates real-time fuel price data from official government sources and authoritative data providers in each supported country, such as data.economie.gouv.fr for France, Tankerkoenig for Germany, and E-Control for Austria."
            }
          },
          {
            "@type": "Question",
            "name": "What fuel types can I compare?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "FuelSaver supports all major fuel types in each country, including gasoline (petrol), diesel, LPG, CNG, ethanol (E85), and premium fuel grades. The available fuel types vary by country."
            }
          },
          {
            "@type": "Question",
            "name": "How do I find the cheapest gas station near me?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Search for your city, postal code, or address on FuelSaver. The app will automatically detect your country and show nearby gas stations sorted by price, with an interactive map showing their locations."
            }
          }
        ]
      }
    </script>

    <!-- Structured Data: BreadcrumbList -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://fuelsaver.one/"
          }
        ]
      }
    </script>
